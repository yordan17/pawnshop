<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вещ - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${pawnItem.name}"></h2>
        <a th:href="@{/pawn-items}" class="btn btn-outline-secondary">← Назад</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <dl class="row">
                        <dt class="col-sm-4">Наименование</dt>
                        <dd class="col-sm-8" th:text="${pawnItem.name}"></dd>

                        <dt class="col-sm-4">Описание</dt>
                        <dd class="col-sm-8" th:text="${pawnItem.description ?: '-'}"></dd>

                        <dt class="col-sm-4">Категория</dt>
                        <dd class="col-sm-8" th:text="${pawnItem.category}"></dd>

                        <dt class="col-sm-4">Състояние</dt>
                        <dd class="col-sm-8" th:text="${pawnItem.condition}"></dd>

                        <dt class="col-sm-4">Оценена стойност</dt>
                        <dd class="col-sm-8" th:text="${'€' + pawnItem.estimatedValue}"></dd>

                        <th:block th:if="${pawnItem.jewelryType != null}">
                            <dt class="col-sm-4">Тип бижу</dt>
                            <dd class="col-sm-8" th:text="${pawnItem.jewelryType}"></dd>
                        </th:block>

                        <th:block th:if="${pawnItem.quantity != null}">
                            <dt class="col-sm-4">Брой</dt>
                            <dd class="col-sm-8" th:text="${pawnItem.quantity + ' бр.'}"></dd>
                        </th:block>

                        <th:block th:if="${pawnItem.brand != null}">
                            <dt class="col-sm-4">Марка</dt>
                            <dd class="col-sm-8" th:text="${pawnItem.brand}"></dd>
                        </th:block>

                        <th:block th:if="${pawnItem.model != null}">
                            <dt class="col-sm-4">Модел</dt>
                            <dd class="col-sm-8" th:text="${pawnItem.model}"></dd>
                        </th:block>

                        <th:block th:if="${pawnItem.serialNumber != null}">
                            <dt class="col-sm-4">Сериен номер</dt>
                            <dd class="col-sm-8" th:text="${pawnItem.serialNumber}"></dd>
                        </th:block>

                        <th:block th:if="${pawnItem.weightGrams != null}">
                            <dt class="col-sm-4">Тегло</dt>
                            <dd class="col-sm-8" th:text="${pawnItem.weightGrams + ' г'}"></dd>
                        </th:block>

                        <th:block th:if="${pawnItem.purityCarats != null}">
                            <dt class="col-sm-4">Проба / Карати</dt>
                            <dd class="col-sm-8" th:text="${pawnItem.purityCarats + ' кт'}"></dd>
                        </th:block>

                        <dt class="col-sm-4">Клиент</dt>
                        <dd class="col-sm-8" th:text="${pawnItem.customer.firstName + ' ' + pawnItem.customer.lastName}"></dd>

                        <dt class="col-sm-4">Статус</dt>
                        <dd class="col-sm-8">
                            <span class="badge"
                                  th:classappend="${pawnItem.status.name() == 'AVAILABLE'} ? 'bg-success' :
                                                 (${pawnItem.status.name() == 'PAWNED'} ? 'bg-warning text-dark' :
                                                 (${pawnItem.status.name() == 'REDEEMED'} ? 'bg-primary' :
                                                 (${pawnItem.status.name() == 'SOLD'} ? 'bg-secondary' : 'bg-danger')))"
                                  th:text="${pawnItem.status}"></span>
                        </dd>
                    </dl>
                </div>
            </div>

            <div class="mt-3 d-flex gap-2">
                <a th:href="@{/pawn-items/{id}/edit(id=${pawnItem.id})}" class="btn btn-primary">Редактирай</a>
                <form th:action="@{/pawn-items/{id}/delete(id=${pawnItem.id})}" method="post"
                      sec:authorize="hasRole('ADMIN')">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Сигурни ли сте?')">Изтрий</button>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Смяна на статус</h5>
                    <form th:action="@{/pawn-items/{id}/status(id=${pawnItem.id})}" method="post">
                        <div class="mb-3">
                            <label for="newStatus" class="form-label">Нов статус</label>
                            <select id="newStatus" name="newStatus" class="form-select">
                                <option th:each="status : ${statuses}"
                                        th:value="${status}"
                                        th:text="${status}"
                                        th:selected="${status == pawnItem.status}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Смени статус</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
