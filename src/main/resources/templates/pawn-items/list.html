<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вещи - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Заложени вещи</h2>
        <a th:href="@{/pawn-items/new}" class="btn btn-primary">Добави вещ</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Наименование</th>
                    <th>Категория</th>
                    <th>Състояние</th>
                    <th>Оценена стойност</th>
                    <th>Статус</th>
                    <th>Клиент</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${pawnItems}">
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.category}"></td>
                    <td th:text="${item.condition}"></td>
                    <td th:text="${item.estimatedValue + ' EUR'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${item.status.name() == 'AVAILABLE'} ? 'bg-success' :
                                             (${item.status.name() == 'PAWNED'} ? 'bg-warning text-dark' :
                                             (${item.status.name() == 'REDEEMED'} ? 'bg-primary' :
                                             (${item.status.name() == 'SOLD'} ? 'bg-secondary' : 'bg-danger')))"
                              th:text="${item.status}"></span>
                    </td>
                    <td th:text="${item.customer.firstName + ' ' + item.customer.lastName}"></td>
                    <td>
                        <a th:href="@{/pawn-items/{id}(id=${item.id})}" class="btn btn-sm btn-outline-primary me-1">Преглед</a>
                        <a th:href="@{/pawn-items/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-secondary me-1">Редактирай</a>
                        <form th:action="@{/pawn-items/{id}/delete(id=${item.id})}" method="post" class="d-inline"
                              sec:authorize="hasRole('ADMIN')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Сигурни ли сте?')">Изтрий</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pawnItems)}">
                    <td colspan="7" class="text-center text-muted">Няма регистрирани вещи.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
