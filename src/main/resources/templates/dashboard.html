<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-5">
    <h2 class="mb-4">Dashboard</h2>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary shadow-sm">
                <div class="card-body text-center py-4">
                    <h6 class="card-title text-uppercase">Клиенти</h6>
                    <p class="display-6 fw-bold mb-0" th:text="${totalCustomers}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body text-center py-4">
                    <h6 class="card-title text-uppercase">Активни договори</h6>
                    <p class="display-6 fw-bold mb-0" th:text="${activeContracts}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning shadow-sm">
                <div class="card-body text-center py-4">
                    <h6 class="card-title text-uppercase">Заложени вещи</h6>
                    <p class="display-6 fw-bold mb-0" th:text="${pawnedItems}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-secondary shadow-sm">
                <div class="card-body text-center py-4">
                    <h6 class="card-title text-uppercase">Плащания</h6>
                    <p class="display-6 fw-bold mb-0" th:text="${totalPayments}">0</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
