<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow" style="width: 420px;">
        <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">Регистрация</h4>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/register}" th:object="${registerForm}" method="post" novalidate>

                <div class="mb-3">
                    <label for="username" class="form-label">Потребителско име</label>
                    <input type="text" id="username" th:field="*{username}"
                           class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                          th:errors="*{username}"></span>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Имейл</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Парола</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                </div>

                <button type="submit" class="btn btn-primary w-100">Регистрирай се</button>
            </form>

            <p class="text-center mt-3 mb-0">
                Вече имате акаунт? <a th:href="@{/login}">Вход</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
