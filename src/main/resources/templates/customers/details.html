<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиент - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${customer.firstName + ' ' + customer.lastName}"></h2>
        <a th:href="@{/customers}" class="btn btn-outline-secondary">← Назад</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <dl class="row">
                <dt class="col-sm-3">Имена</dt>
                <dd class="col-sm-9" th:text="${customer.firstName + ' ' + customer.lastName}"></dd>

                <dt class="col-sm-3">Телефон</dt>
                <dd class="col-sm-9" th:text="${customer.phoneNumber}"></dd>

                <dt class="col-sm-3">Имейл</dt>
                <dd class="col-sm-9" th:text="${customer.email}"></dd>

                <dt class="col-sm-3">ЕГН</dt>
                <dd class="col-sm-9" th:text="${customer.personalId}"></dd>

                <dt class="col-sm-3">Град</dt>
                <dd class="col-sm-9" th:text="${customer.city}"></dd>

                <dt class="col-sm-3">Улица</dt>
                <dd class="col-sm-9" th:text="${customer.street}"></dd>

            </dl>
        </div>
    </div>

    <div class="mt-3 d-flex gap-2">
        <a th:href="@{/customers/{id}/edit(id=${customer.id})}" class="btn btn-primary">Редактирай</a>
        <form th:action="@{/customers/{id}/delete(id=${customer.id})}" method="post"
              sec:authorize="hasRole('ADMIN')">
            <button type="submit" class="btn btn-danger"
                    onclick="return confirm('Сигурни ли сте?')">Изтрий</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
