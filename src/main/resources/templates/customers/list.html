<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиенти - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Клиенти</h2>
        <a th:href="@{/customers/new}" class="btn btn-primary">Добави клиент</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Имена</th>
                    <th>Телефон</th>
                    <th>Имейл</th>
                    <th>ЕГН</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.firstName + ' ' + customer.lastName}"></td>
                    <td th:text="${customer.phoneNumber}"></td>
                    <td th:text="${customer.email}"></td>
                    <td th:text="${customer.personalId}"></td>
                    <td>
                        <span th:if="${customer.active}" class="badge bg-success">Активен</span>
                        <span th:unless="${customer.active}" class="badge bg-secondary">Неактивен</span>
                    </td>
                    <td>
                        <a th:href="@{/customers/{id}(id=${customer.id})}" class="btn btn-sm btn-outline-primary me-1">Преглед</a>
                        <a th:href="@{/customers/{id}/edit(id=${customer.id})}" class="btn btn-sm btn-outline-secondary me-1">Редактирай</a>
                        <form th:action="@{/customers/{id}/delete(id=${customer.id})}" method="post" class="d-inline"
                              sec:authorize="hasRole('ADMIN')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Сигурни ли сте?')">Изтрий</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="6" class="text-center text-muted">Няма регистрирани клиенти.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
