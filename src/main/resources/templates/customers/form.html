<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиент - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${customerId != null} ? 'Редактирай клиент' : 'Нов клиент'"></h2>
        <a th:href="@{/customers}" class="btn btn-outline-secondary">← Назад</a>
    </div>

    <div class="card shadow-sm" style="max-width: 600px;">
        <div class="card-body">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="${customerId != null} ? @{/customers/{id}/edit(id=${customerId})} : @{/customers}"
                  th:object="${customerRequest}" method="post" novalidate>

                <div class="mb-3">
                    <label for="firstName" class="form-label">Име</label>
                    <input type="text" id="firstName" th:field="*{firstName}"
                           class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                          th:errors="*{firstName}"></span>
                </div>

                <div class="mb-3">
                    <label for="lastName" class="form-label">Фамилия</label>
                    <input type="text" id="lastName" th:field="*{lastName}"
                           class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                          th:errors="*{lastName}"></span>
                </div>

                <div class="mb-3">
                    <label for="phoneNumber" class="form-label">Телефон</label>
                    <input type="text" id="phoneNumber" th:field="*{phoneNumber}"
                           class="form-control" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}"
                          th:errors="*{phoneNumber}"></span>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Имейл</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="mb-3">
                    <label for="personalId" class="form-label">ЕГН</label>
                    <input type="text" id="personalId" th:field="*{personalId}"
                           class="form-control" th:classappend="${#fields.hasErrors('personalId')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('personalId')}"
                          th:errors="*{personalId}"></span>
                </div>

                <div class="mb-3">
                    <label for="address" class="form-label">Адрес</label>
                    <input type="text" id="address" th:field="*{address}"
                           class="form-control" th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
                    <span class="invalid-feedback" th:if="${#fields.hasErrors('address')}"
                          th:errors="*{address}"></span>
                </div>

                <button type="submit" class="btn btn-primary w-100"
                        th:text="${customerId != null} ? 'Запази промените' : 'Добави клиент'"></button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
