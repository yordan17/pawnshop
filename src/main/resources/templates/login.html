<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow" style="width: 420px;">
        <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">Вход</h4>

            <div th:if="${param.registered}" class="alert alert-success">
                Регистрацията е успешна. Влезте с вашите данни.
            </div>

            <div th:if="${param.error}" class="alert alert-danger">
                Грешно потребителско име или парола.
            </div>

            <div th:if="${param.logout}" class="alert alert-info">
                Успешно излязохте от системата.
            </div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label">Потребителско име</label>
                    <input type="text" id="username" name="username"
                           class="form-control" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Парола</label>
                    <input type="password" id="password" name="password"
                           class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Вход</button>
            </form>

            <p class="text-center mt-3 mb-0">
                Нямате акаунт? <a th:href="@{/register}">Регистрирайте се</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
