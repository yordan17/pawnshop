<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Договор - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="'Договор ' + ${contract.contractNumber}"></h2>
        <a th:href="@{/contracts}" class="btn btn-outline-secondary">← Назад</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card shadow-sm mb-3">
                <div class="card-header fw-bold">Детайли на договора</div>
                <div class="card-body">
                    <dl class="row">
                        <dt class="col-sm-4">Номер</dt>
                        <dd class="col-sm-8" th:text="${contract.contractNumber}"></dd>

                        <dt class="col-sm-4">Клиент</dt>
                        <dd class="col-sm-8"
                            th:text="${contract.customer.firstName + ' ' + contract.customer.lastName}"></dd>

                        <dt class="col-sm-4">Вещ</dt>
                        <dd class="col-sm-8" th:text="${contract.pawnItem.name}"></dd>

                        <dt class="col-sm-4">Сума на заема</dt>
                        <dd class="col-sm-8" th:text="${contract.loanAmount + ' EUR'}"></dd>

                        <dt class="col-sm-4">Лихвен процент</dt>
                        <dd class="col-sm-8" th:text="${contract.interestRate + '%'}"></dd>

                        <dt class="col-sm-4">Начална дата</dt>
                        <dd class="col-sm-8" th:text="${contract.startDate}"></dd>

                        <dt class="col-sm-4">Краен срок</dt>
                        <dd class="col-sm-8" th:text="${contract.dueDate}"></dd>

                        <dt class="col-sm-4">Статус</dt>
                        <dd class="col-sm-8">
                            <span class="badge"
                                  th:classappend="${contract.status.name() == 'ACTIVE'} ? 'bg-success' :
                                                 (${contract.status.name() == 'REDEEMED'} ? 'bg-primary' :
                                                 (${contract.status.name() == 'EXPIRED'} ? 'bg-warning text-dark' :
                                                 (${contract.status.name() == 'SOLD'} ? 'bg-secondary' : 'bg-danger')))"
                                  th:text="${contract.status}"></span>
                        </dd>

                        <dt class="col-sm-4">Създаден от</dt>
                        <dd class="col-sm-8" th:text="${contract.createdBy.username}"></dd>
                    </dl>
                </div>
            </div>

            <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/contracts/{id}/edit(id=${contract.id})}" class="btn btn-primary">Редактирай</a>
                <form th:action="@{/contracts/{id}/delete(id=${contract.id})}" method="post">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Отмяна на договора?')">Отмени</button>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title mb-3">Смяна на статус</h5>
                    <form th:action="@{/contracts/{id}/status(id=${contract.id})}" method="post">
                        <div class="mb-3">
                            <label for="newStatus" class="form-label">Нов статус</label>
                            <select id="newStatus" name="newStatus" class="form-select">
                                <option th:each="status : ${statuses}"
                                        th:value="${status}"
                                        th:text="${status}"
                                        th:selected="${status == contract.status}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Смени статус</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header fw-bold">Плащания</div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Дата</th>
                                <th>Сума</th>
                                <th>Тип</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="payment : ${payments}">
                                <td th:text="${payment.paymentDate}"></td>
                                <td th:text="${payment.amount + ' EUR'}"></td>
                                <td th:text="${payment.type}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(payments)}">
                                <td colspan="3" class="text-center text-muted py-2">Няма плащания.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
