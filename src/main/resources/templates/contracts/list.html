<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Договори - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Договори</h2>
        <a th:href="@{/contracts/new}" class="btn btn-primary">Нов договор</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-dark text-nowrap">
                <tr>
                    <th>Номер</th>
                    <th>Клиент</th>
                    <th>Вещ</th>
                    <th>Сума (EUR)</th>
                    <th>Лихва (%)</th>
                    <th>Начало</th>
                    <th>Краен срок</th>
                    <th>Очакв. лихва (EUR)</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="contract : ${contracts}"
                    th:classappend="${contract.status.name() != 'ACTIVE'} ? 'table-secondary text-muted'">
                    <td th:text="${contract.contractNumber}"></td>
                    <td th:text="${contract.customer.firstName + ' ' + contract.customer.lastName}"></td>
                    <td th:text="${contract.pawnItem.name}"></td>
                    <td th:text="${'€' + contract.loanAmount}"></td>
                    <td th:text="${contract.interestRate + '%'}"></td>
                    <td class="text-nowrap" th:text="${contract.startDate}"></td>
                    <td class="text-nowrap" th:text="${contract.dueDate}"></td>
                    <td th:text="${'€' + interestMap[contract.id]}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${contract.status.name() == 'ACTIVE'} ? 'bg-success' :
                                             (${contract.status.name() == 'REDEEMED'} ? 'bg-primary' :
                                             (${contract.status.name() == 'EXPIRED'} ? 'bg-warning text-dark' :
                                             (${contract.status.name() == 'SOLD'} ? 'bg-secondary' : 'bg-danger')))"
                              th:text="${contract.status}"></span>
                    </td>
                    <td class="text-nowrap">
                        <a th:href="@{/contracts/{id}(id=${contract.id})}" class="btn btn-sm btn-outline-primary">Преглед</a>
                        <a th:if="${contract.status.name() == 'ACTIVE'}"
                           th:href="@{/payments/new(preselectedContractId=${contract.id})}"
                           class="btn btn-sm btn-success">Плати</a>
                        <a th:href="@{/contracts/{id}/edit(id=${contract.id})}" class="btn btn-sm btn-outline-secondary"
                           sec:authorize="hasRole('ADMIN')">Редактирай</a>
                        <form th:action="@{/contracts/{id}/delete(id=${contract.id})}" method="post" class="d-inline"
                              sec:authorize="hasRole('ADMIN')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Отмяна на договора?')">Отмени</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(contracts)}">
                    <td colspan="9" class="text-center text-muted">Няма регистрирани договори.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
