<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плащания - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Плащания</h2>
        <a th:href="@{/payments/new}" class="btn btn-primary">Регистрирай плащане</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Договор</th>
                    <th>Клиент</th>
                    <th>Сума (EUR)</th>
                    <th>Дата</th>
                    <th>Тип</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="payment : ${payments}">
                    <td th:text="${payment.contract.contractNumber}"></td>
                    <td th:text="${payment.contract.customer.firstName + ' ' + payment.contract.customer.lastName}"></td>
                    <td th:text="${payment.amount}"></td>
                    <td th:text="${payment.paymentDate}"></td>
                    <td th:text="${payment.type}"></td>
                    <td>
                        <a th:href="@{/payments/{id}(id=${payment.id})}" class="btn btn-sm btn-outline-primary">Преглед</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(payments)}">
                    <td colspan="6" class="text-center text-muted">Няма регистрирани плащания.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
