<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ново плащане - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Регистрирай плащане</h2>
        <a th:href="@{/payments}" class="btn btn-outline-secondary">← Назад</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/payments}" th:object="${paymentRequest}" method="post">

                        <div class="mb-3">
                            <label for="contractId" class="form-label">Договор</label>
                            <select id="contractId" th:field="*{contractId}" class="form-select"
                                    th:classappend="${#fields.hasErrors('contractId')} ? 'is-invalid'">
                                <option value="">-- Избери договор --</option>
                                <option th:each="contract : ${activeContracts}"
                                        th:value="${contract.id}"
                                        th:text="${contract.contractNumber + ' — ' + contract.customer.firstName + ' ' + contract.customer.lastName}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('contractId')}"
                                 th:errors="*{contractId}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="amount" class="form-label">Сума (EUR)</label>
                            <input type="number" step="0.01" id="amount" th:field="*{amount}"
                                   class="form-control" th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('amount')}"
                                 th:errors="*{amount}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="paymentDate" class="form-label">Дата</label>
                            <input type="date" id="paymentDate" th:field="*{paymentDate}"
                                   class="form-control" th:classappend="${#fields.hasErrors('paymentDate')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('paymentDate')}"
                                 th:errors="*{paymentDate}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="type" class="form-label">Тип</label>
                            <select id="type" th:field="*{type}" class="form-select"
                                    th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                                <option value="">-- Избери тип --</option>
                                <option th:each="pt : ${paymentTypes}"
                                        th:value="${pt}"
                                        th:text="${pt}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}"
                                 th:errors="*{type}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Бележки</label>
                            <textarea id="notes" th:field="*{notes}" class="form-control" rows="3"
                                      th:classappend="${#fields.hasErrors('notes')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('notes')}"
                                 th:errors="*{notes}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Регистрирай</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const contractDataMap = /*[[${contractDataMap}]]*/ {};
    const contractSelect = document.getElementById('contractId');
    const amountInput = document.getElementById('amount');
    const dateInput = document.getElementById('paymentDate');
    const typeSelect = document.getElementById('type');

    function recalculate() {
        const selectedId = contractSelect.value;
        const paymentDate = dateInput.value;
        const type = typeSelect.value;
        if (!selectedId || !paymentDate || !contractDataMap[selectedId]) {
            return;
        }
        const data = contractDataMap[selectedId];
        const startDate = new Date(data.startDate);
        const dueDate = new Date(data.dueDate);
        const payment = new Date(paymentDate);
        const totalPeriodDays = Math.round((dueDate - startDate) / 86400000);
        const daysElapsed = Math.round((payment - startDate) / 86400000);
        const dailyInterest = totalPeriodDays > 0 ? (data.loanAmount * data.interestRate / 100) / totalPeriodDays : 0;
        const accruedInterest = daysElapsed > 0 ? dailyInterest * daysElapsed : 0;

        if (type === 'INTEREST') {
            amountInput.value = accruedInterest.toFixed(2);
        } else {
            amountInput.value = (parseFloat(data.loanAmount) + accruedInterest).toFixed(2);
        }
    }

    contractSelect.addEventListener('change', recalculate);
    dateInput.addEventListener('change', recalculate);
    typeSelect.addEventListener('change', recalculate);

    if (contractSelect.value) {
        recalculate();
    }
</script>
</body>
</html>
