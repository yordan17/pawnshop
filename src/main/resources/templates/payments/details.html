<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плащане - Заложна Къща</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Детайли на плащане</h2>
        <a th:href="@{/payments}" class="btn btn-outline-secondary">← Назад</a>
    </div>

    <div class="row">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header fw-bold">Информация за плащането</div>
                <div class="card-body">
                    <dl class="row">
                        <dt class="col-sm-4">Договор</dt>
                        <dd class="col-sm-8">
                            <a th:href="@{/contracts/{id}(id=${payment.contract.id})}"
                               th:text="${payment.contract.contractNumber}"></a>
                        </dd>

                        <dt class="col-sm-4">Клиент</dt>
                        <dd class="col-sm-8" th:text="${payment.contract.customer.firstName + ' ' + payment.contract.customer.lastName}"></dd>

                        <dt class="col-sm-4">Сума</dt>
                        <dd class="col-sm-8" th:text="${payment.amount + ' EUR'}"></dd>

                        <dt class="col-sm-4">Дата</dt>
                        <dd class="col-sm-8" th:text="${payment.paymentDate}"></dd>

                        <dt class="col-sm-4">Тип</dt>
                        <dd class="col-sm-8" th:text="${payment.type}"></dd>

                        <dt class="col-sm-4">Бележки</dt>
                        <dd class="col-sm-8" th:text="${payment.notes ?: '-'}"></dd>

                        <dt class="col-sm-4">Прието от</dt>
                        <dd class="col-sm-8" th:text="${payment.receivedBy.username}"></dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
